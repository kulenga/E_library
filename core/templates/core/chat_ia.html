{% extends 'core/base.html' %}

{% block content %}

<nav class="flex px-5 py-3 text-gray-700 border border-gray-200 rounded-xl bg-white mb-4" aria-label="Breadcrumb">
  <ol class="inline-flex items-center space-x-1 md:space-x-3">
    <li class="inline-flex items-center">
      <a href="{% url 'dashboard' %}" class="text-sm font-medium text-gray-700 hover:text-indigo-600">Tableau de bord</a>
    </li>
    <li>
      <div class="flex items-center">
        <svg class="w-3 h-3 text-gray-400 mx-1" fill="currentColor" viewBox="0 0 20 20"><path d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"></path></svg>
        <span class="ml-1 text-sm font-medium text-indigo-600">
            {% if salon %}Salon : {{ salon.nom }}{% else %}Assistant IA{% endif %}
        </span>
      </div>
    </li>
  </ol>
</nav>

<div class="max-w-2xl mx-auto p-4">
    <div class="bg-white border rounded-2xl shadow-sm h-[500px] flex flex-col overflow-hidden">
        <div class="p-4 border-b font-bold text-indigo-900">Assistant IA (Gemini)</div>
        
        <div id="chat-window" class="flex-grow p-4 overflow-y-auto space-y-4 bg-gray-50">
            <div class="text-xs text-gray-500 italic">Posez votre question à l'IA...</div>
        </div>

        <form id="ia-form" class="p-4 border-t flex gap-2">
            {% csrf_token %}
            <input type="text" id="user-input" required 
                   class="flex-grow p-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" 
                   placeholder="Posez votre question...">
            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold">Envoyer</button>
        </form>
    </div>
</div>

<script>
    const form = document.getElementById('ia-form');
    const window = document.getElementById('chat-window');
    const input = document.getElementById('user-input');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = input.value;
        
        // 1. Affiche le message utilisateur
        window.innerHTML += `<div class="text-right text-xs bg-indigo-100 p-2 rounded-lg inline-block float-right clear-both">${text}</div>`;
        input.value = '';

        // 2. Appel à la vue Django
        const response = await fetch("{% url 'chat_ia' %}", {
            method: 'POST',
            headers: { 'X-CSRFToken': '{{ csrf_token }}' },
            body: new URLSearchParams({ 'texte': text })
        });
        
        const data = await response.json();
        
        // 3. Affiche la réponse de l'IA
        window.innerHTML += `<div class="text-left text-xs bg-gray-200 p-2 rounded-lg inline-block float-left clear-both">${data.message}</div>`;
        window.scrollTop = window.scrollHeight;
    });
</script>
{% endblock %}
