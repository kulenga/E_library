{% extends 'base.html' %}
{% block content %}
<div class="max-w-5xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-8">Catalogue Complet des Programmes</h1>
    
    {% for filiere, cours_list in catalogue.items %}
    <div class="mb-10 bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
        <h2 class="text-2xl font-extrabold text-indigo-900 mb-4 border-b pb-2">{{ filiere }}</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            {% for cours in cours_list %}
            <div class="p-3 bg-gray-50 rounded-lg border border-gray-100">
                <span class="text-[10px] font-bold text-indigo-600 bg-indigo-100 px-2 py-0.5 rounded">{{ cours.promotion }}</span>
                <span class="font-mono text-xs font-bold text-gray-500 ml-2">{{ cours.code_ue }}</span>
                <p class="text-sm font-medium mt-1">{{ cours.intitule }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
